<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Accounting illustration</title>
  <desc>An invoice card stamped paid, a small rising bar chart, scattered coins, and faint ledger rule lines, in navy, green and gold.</desc>

  <g opacity="0.08" stroke="#11203A" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
  </g>

  <g transform="rotate(-4 400 300)">
    <rect x="220" y="80" width="360" height="440" rx="16" fill="#FFFFFF" stroke="#11203A" stroke-width="2" opacity="0.96"/>
    <rect x="252" y="120" width="180" height="14" rx="4" fill="#11203A" opacity="0.85"/>
    <rect x="252" y="150" width="120" height="10" rx="3" fill="#5C6670" opacity="0.6"/>
    <line x1="252" y1="190" x2="548" y2="190" stroke="#D7DBE0" stroke-width="2"/>

    <rect x="252" y="210" width="200" height="10" rx="3" fill="#5C6670" opacity="0.5"/>
    <rect x="480" y="210" width="68" height="10" rx="3" fill="#11203A" opacity="0.7"/>
    <rect x="252" y="236" width="160" height="10" rx="3" fill="#5C6670" opacity="0.5"/>
    <rect x="480" y="236" width="68" height="10" rx="3" fill="#11203A" opacity="0.7"/>
    <rect x="252" y="262" width="180" height="10" rx="3" fill="#5C6670" opacity="0.5"/>
    <rect x="480" y="262" width="68" height="10" rx="3" fill="#11203A" opacity="0.7"/>

    <line x1="252" y1="300" x2="548" y2="300" stroke="#D7DBE0" stroke-width="2"/>
    <rect x="400" y="320" width="148" height="16" rx="4" fill="#1F7A55"/>

    <g transform="rotate(-12 470 430)">
      <circle cx="470" cy="430" r="46" fill="none" stroke="#1F7A55" stroke-width="3" opacity="0.85"/>
      <text x="470" y="436" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1F7A55" text-anchor="middle">PAID</text>
    </g>
  </g>

  <g transform="translate(80,360)">
    <rect x="0" y="80" width="28" height="60" rx="4" fill="#D9A441" opacity="0.85"/>
    <rect x="40" y="50" width="28" height="90" rx="4" fill="#1F7A55" opacity="0.85"/>
    <rect x="80" y="20" width="28" height="120" rx="4" fill="#11203A" opacity="0.85"/>
  </g>

  <circle cx="620" cy="120" r="22" fill="#D9A441" opacity="0.9"/>
  <circle cx="655" cy="95" r="14" fill="#D9A441" opacity="0.6"/>
  <circle cx="140" cy="160" r="16" fill="#1F7A55" opacity="0.5"/>
</svg>
